</head>
<body>
  <div class="container">
    <h1>Accessible LaTeX Preprocessor</h1>
<!--
    <p class="subtitle">Upload a .tex, .zip, or .tar.gz file to extract and view contents</p>
-->

    <div class="upload-section">
      <div class="upload-area" id="uploadArea">
<!--
        <div class="upload-icon">📦</div>
-->
        <div class="upload-text">Click or drag to upload</div>
        <div class="upload-hint">Supports .tex, .zip, and .tar.gz files</div>
        <input type="file" id="fileInput" accept=".tex, .zip,.gz,.tar.gz">
        <button class="button" id="selectButton">Select File</button>
      </div>


      <div class="status" id="uploadStatus"></div>
    </div>

   <div class="hide" id="preprocessSection">
   <h2>The following changes were made automatically</h2>
   <div class="preprocess" id="preprocessStatus"></div>
   </div>

   <div class="hide" id="anomalySection">
   <h2>The following issues may affect the conversion to PreTeXt/HTML</h2>
   <div class="inprocess" id="anomalyStatus"></div>
   </div>

    <div id="scannedTextArea"></div>

    <div class="results-section" id="resultsSection">
      <div class="results-header">Files (<span id="fileCount">0</span>)</div>
      <div class="file-list" id="fileList"></div>
      <div id="selectedFileContent"></div>
    </div>

  <div class="structure" id="structureSection"></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script type="module" src="./src/main.js"></script>
<script>

function scrollToClass(className,offset) {
   const theseelements = document.getElementsByClassName(className);
   var element;
   if(offset == 0) {element = theseelements[0]}
   else {element = theseelements[theseelements.length - 1]}
// console.log("clicked!", document.getElementsByClassName(className));
   if (element) {
    // Scroll to the element
      element.scrollIntoView({ behavior:"smooth" });
      element.focus();

   } else {
      return false;
}
}

function replacetex(oldvalue, newvalue, howmany) {
//    let relevantelement = document.activeElement.closest('".'+oldvalue+'"');
 //   let relevantelement = document.activeElement.closest("'[data-macro=" + '"' + oldvalue + '"]' + "'");
    const thissearch = '[data-macro="' + oldvalue + '"]';
    let relevantelement = document.activeElement.closest(thissearch);
//    let relevantelement = document.activeElement.closest(".textit");
console.log("X"+oldvalue+"Y");
console.log("X"+thissearch+"Y");
console.log("relevantelement:", relevantelement);

    if(howmany == 0) {
       relevantelement.remove()
    } else if (howmany == -1) {
       const theseelements = document.querySelectorAll(thissearch);
console.log("theseelements:", theseelements);
       for(const elt of theseelements) {
          elt.remove()
       }
    } else if (howmany == 1) {
       const thiselement = document.querySelector(thissearch);
console.log("theseelements:", thiselement);
       thiselement.replaceWith("\\" + newvalue)
    }  else if (howmany == 1000) {
       const theseelements = document.querySelectorAll(thissearch);
console.log("theseelements:", theseelements);
       for(const elt of theseelements) {
          elt.replaceWith("\\" + newvalue)
       }
    }
}

function closemenu() {
   const thismenu = document.activeElement.parentElement;
   const itemofinterest = thismenu.parentElement
   itemofinterest.focus();
   thismenu.remove()
}

</script>
