    <script>
        const fileInput = document.getElementById('fileInput');
        const contentDisplay = document.getElementById('sourceTextArea');
        const status = document.getElementById('status');
        let fileContent = ''; // Stores the file content as a string
 
        // Check for FileReader support
        if (!window.FileReader) {
//            setStatus('FileReader is not supported in your browser. Please upgrade.', 'error');
console.log("error 1");
//            fileInput.disabled = true;
    
        }
 
        // Event listener for file selection
        fileInput.addEventListener('change', handleFileSelect);
 
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) {
 //               setStatus('No file selected.', 'warning');
console.log("No file selected?");
                return;
            }
 
            // Validate file size (<10MB)
            if (file.size > 10 * 1024 * 1024) {
//                setStatus('File too large! Maximum size is 10MB.', 'error');
console.log("file too large");
                return;
            }
 
            // Validate file type
//            const allowedTypes = ['text/plain', 'text/csv', 'application/json'];
//            if (!allowedTypes.includes(file.type)) {
//                setStatus('Unsupported file type. Use .txt, .csv, or .json.', 'error');
//                return;
//            }
 
            readFileAsText(file);
        }
 
        function readFileAsText(file) {
            const reader = new FileReader();
 
            reader.onload = (event) => {
                fileContent = event.target.result; // Store content in variable
                contentDisplay.value = fileContent; // Display content
//                setStatus(`Loaded "${file.name}" (${file.size} bytes)`, 'success');
console.log("loaded file");
 //               processsource()
            };
 
            reader.onerror = () => {
                setStatus(`Error reading file: ${reader.error.message}`, 'error');
            };
 
            reader.readAsText(file);
        }
 
        function setStatus(message, type = 'info') {
            status.textContent = message;
            status.className = `status ${type}`;
        }
    </script>
